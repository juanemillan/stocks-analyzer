name: Daily ETL

on:
  schedule:
    # Runs at 22:00 UTC Mon–Fri (after US market close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  etl:
    name: Fetch prices & recompute scores
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update prices (incremental)
        working-directory: data_pipeline
        run: python main.py --update

      - name: Recompute scores
        working-directory: data_pipeline
        run: python main.py --scores

      - name: Pipeline status
        working-directory: data_pipeline
        run: python main.py --status

      - name: Generate AI nightly insights
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY:        ${{ secrets.OPENROUTER_API_KEY }}
        working-directory: data_pipeline
        run: python generate_insights.py

      - name: Notify on failure
        if: failure()
        env:
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          VAPID_PRIVATE_KEY:         ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT:             ${{ secrets.VAPID_SUBJECT }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
          DASHBOARD_URL:             "https://bullia.vercel.app"
        run: |
          pip install pywebpush supabase python-dotenv --quiet
          python data_pipeline/send_push.py \
            --title "⚠️ Pipeline failed" \
            --body "The nightly ETL did not complete. Check GitHub Actions for details."
