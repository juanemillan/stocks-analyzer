name: Sync Racional Portfolio

on:
  # Run automatically every weekday at 21:00 UTC (≈ 18:00 Chile / 5pm ET)
  schedule:
    - cron: '0 21 * * 1-5'

  # Allow triggering on-demand from the dashboard or GitHub UI
  workflow_dispatch:
    inputs:
      user_id:
        description: 'Supabase user UUID (overrides RACIONAL_USER_ID secret)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install python-dotenv playwright supabase

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Run Racional sync
        env:
          RACIONAL_FIREBASE_API_KEY: ${{ secrets.RACIONAL_FIREBASE_API_KEY }}
          RACIONAL_EMAIL:            ${{ secrets.RACIONAL_EMAIL }}
          RACIONAL_PASSWORD:         ${{ secrets.RACIONAL_PASSWORD }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RACIONAL_USER_ID:          ${{ secrets.RACIONAL_USER_ID }}
        run: |
          cd data_pipeline
          USER_ARG="${{ github.event.inputs.user_id }}"
          if [ -n "$USER_ARG" ]; then
            python sync_racional_standalone.py --user-id "$USER_ARG"
          else
            python sync_racional_standalone.py
          fi
